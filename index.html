<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q$Practice1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<h1>Javascript Conditional Statements</h1>
<input type="text" id="Age" class="form-control" placeholder="type here..."> <!--asks for user input-->
<button class="btn btn-info" onclick="checkAge()"></button>  <!--function executes when button is plressed-->
    
    <script>
        //checkAge

        var age = document.getElementById("Age").value; //id is the id of the input box so it will get the input.

        function checkAge(){
        
            //isNaN means the input is not a number. This is going to check if the input is a numerical value.
        if (isNaN(age) || age < 0){
            alert.("Please input a valid number.");
        }

        else if(age < 18){
            alert("You are underage.")
        } 

        else if(age > 18){
            alert("You are of legal age.") 
        }
       
        else{
            alert("Your age could not be classified.")
        }
        }

    </script>

</body>
</html>
